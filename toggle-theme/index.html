<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>
    <header>
        <h1>My Website</h1>

        <!-- JS se is button par click handle kar lena -->
        <button id="theme-toggle">
            Toggle theme
        </button>
    </header>

    <main>
        <h2>Welcome</h2>
        <p>
            Yeh ek basic template hai jisme light aur dark theme CSS se handle ho rahi hai.
        </p>

        <div class="card">
            <h3>Card Title</h3>
            <p>Card content...</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
